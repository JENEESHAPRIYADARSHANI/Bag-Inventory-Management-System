# Cloud deployment configuration for Quotation Service
# Use this profile when deploying to cloud platforms

# Server Configuration
server.port=${PORT:8080}

# Database Configuration (Cloud)
# Replace with your cloud database URL
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/quotation_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# External Service URLs (Cloud)
product.service.url=${PRODUCT_SERVICE_URL:http://localhost:8081/api/products}
order.service.url=${ORDER_SERVICE_URL:http://localhost:8082/api/orders}

# Logging
logging.level.root=INFO
logging.level.com.example.quotation_service=INFO

# Actuator for health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
