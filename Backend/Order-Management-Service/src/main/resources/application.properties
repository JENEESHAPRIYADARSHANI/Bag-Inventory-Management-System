# =========================
# Server
# =========================
server.port=${SERVER_PORT:8083}

# =========================
# Datasource (safe defaults)
# - In Docker: use env vars from compose
# - Locally: defaults to localhost
# =========================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/order_management_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:orderuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:orderpass}

# HikariCP (more stable)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000

# =========================
# JPA / Hibernate
# =========================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# (Optional) Let Spring auto-detect dialect; don't hardcode MySQL8Dialect
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# =========================
# Actuator
# =========================
management.endpoints.web.exposure.include=health,mappings
management.endpoint.health.show-details=always

# =========================
# Logging
# =========================
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql=INFO
