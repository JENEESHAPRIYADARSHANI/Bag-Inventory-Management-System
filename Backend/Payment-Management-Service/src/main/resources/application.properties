# Server Configuration
server.port=8085
spring.application.name=payment-management-service

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/payment_management_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=0904
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.starbag.Payment_Management_Service=DEBUG
logging.level.org.hibernate.SQL=DEBUG
