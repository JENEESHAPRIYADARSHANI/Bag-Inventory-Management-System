# Docker Profile Configuration for Quotation Service
spring.application.name=quotation-service

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Configuration (Docker MySQL)
spring.datasource.url=jdbc:mysql://mysql:3306/quotation_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# Logging Configuration
logging.level.com.example.quotation_service=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Actuator Configuration (for health checks)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.db.enabled=true

# External Service URLs (Docker network)
product.service.url=${PRODUCT_SERVICE_URL:http://product-service:8081/api/products}
order.service.url=${ORDER_SERVICE_URL:http://order-service:8082/api/orders}

# CORS Configuration (allow frontend container)
cors.allowed-origins=http://localhost:5173,http://frontend:80,http://localhost:3000

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC