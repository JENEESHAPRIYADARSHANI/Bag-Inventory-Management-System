# Docker-specific configuration for Quotation Service

# Server Configuration
server.port=8080

# Database Configuration (Docker)
spring.datasource.url=jdbc:mysql://mysql:3306/quotation_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# External Service URLs (Docker network)
product.service.url=${PRODUCT_SERVICE_URL:http://product-service:8081/api/products}
order.service.url=${ORDER_SERVICE_URL:http://order-service:8082/api/orders}

# Logging
logging.level.root=INFO
logging.level.com.example.quotation_service=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Actuator (for health checks)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
