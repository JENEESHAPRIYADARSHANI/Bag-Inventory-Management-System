# Cloud deployment configuration for Quotation Service
# Use this profile when deploying to cloud platforms

# Server Configuration
server.port=${PORT:8080}

# Database Configuration (Cloud) - Using existing AWS RDS
spring.datasource.url=jdbc:mysql://quotation-db.cbmwmuy06xhc.eu-north-1.rds.amazonaws.com:3306/quotation_db?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=admin
spring.datasource.password=Wr250x8052Admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

