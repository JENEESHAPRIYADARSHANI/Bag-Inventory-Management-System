# Local MySQL Development Configuration
spring.application.name=quotation-service

# Local MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/quotation_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Wr250x&@8052
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080

# Microservice URLs (fallback to temporary data if services not available)
product.service.url=http://localhost:8081/api/products
order.service.url=http://localhost:8082/api/orders

# Logging
logging.level.com.example.quotation_service=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE