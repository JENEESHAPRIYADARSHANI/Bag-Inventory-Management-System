version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: quotation-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: quotation_db
      MYSQL_USER: ${DB_USERNAME:-quotation_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - quotation-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Quotation Service (Spring Boot)
  quotation-service:
    build:
      context: ./Backend/quotation-service
      dockerfile: Dockerfile
    container_name: quotation-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      PRODUCT_SERVICE_URL: ${PRODUCT_SERVICE_URL:-http://product-service:8081/api/products}
      ORDER_SERVICE_URL: ${ORDER_SERVICE_URL:-http://order-service:8082/api/orders}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - quotation-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Frontend (React + Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quotation-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - quotation-service
    networks:
      - quotation-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  quotation-network:
    driver: bridge
    name: quotation-network

volumes:
  mysql_data:
    name: quotation-mysql-data
