spring.application.name=order-management-service

# Database configuration with environment variable support
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/order_management_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:orderuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:order123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server port
server.port=8082